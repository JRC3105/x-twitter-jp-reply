<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Reply Generator - Gemini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #1d4ed8 100%);
        }
        .loading-spinner {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen gradient-bg text-white">
    <div class="container mx-auto px-4 py-12 max-w-4xl">
        <div class="text-center mb-12">
            <i class="fas fa-reply-all text-6xl mb-4 text-yellow-400"></i>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">X Reply Generator</h1>
            <p class="text-xl opacity-90">Buat balasan cerdas untuk postingan X/Twitter menggunakan Gemini AI</p>
        </div>

        <div class="bg-white/10 backdrop-blur-lg rounded-2xl p-8 shadow-2xl border border-white/20">
            <div class="mb-6">
                <label class="block text-lg font-semibold mb-3">Paste Link X/Twitter:</label>
                <div class="relative">
                    <i class="fas fa-link absolute left-4 top-4 text-gray-400"></i>
                    <input 
                        type="url" 
                        id="urlInput" 
                        placeholder="https://x.com/username/status/123456..." 
                        class="w-full pl-12 pr-4 py-4 bg-white/20 border-2 border-white/30 rounded-xl text-white placeholder-gray-300 focus:border-blue-400 focus:outline-none focus:bg-white/30 transition-all duration-300 text-lg"
                    >
                </div>
                <div id="status" class="mt-3 font-medium"></div>
            </div>

            <button 
                id="analyzeBtn" 
                class="w-full bg-gradient-to-r from-yellow-400 to-orange-500 hover:from-yellow-500 hover:to-orange-600 text-black font-bold py-4 px-8 rounded-xl text-xl shadow-xl transform hover:scale-105 transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none"
                disabled
            >
                <span id="btnText">Analisis Tweet</span>
                <i id="btnIcon" class="fas fa-magic ml-2"></i>
            </button>
        </div>

        <div id="loading" class="hidden mt-8 text-center">
            <i class="fas fa-spinner loading-spinner text-4xl text-yellow-400 mb-4"></i>
            <p class="text-xl">Menganalisis tweet dan generate balasan...</p>
        </div>

        <div id="result" class="hidden mt-8 bg-white/10 backdrop-blur-lg rounded-2xl p-8 shadow-2xl border border-white/20">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold"><i class="fas fa-lightbulb text-yellow-400 mr-3"></i>Balasan yang Disarankan</h3>
                <button id="copyBtn" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-lg font-semibold transition-colors">
                    <i class="fas fa-copy mr-2"></i>Copy
                </button>
            </div>
            <div id="replyContent" class="text-lg leading-relaxed whitespace-pre-wrap bg-white/5 p-6 rounded-xl border-l-4 border-blue-400"></div>
            <div class="mt-6 p-4 bg-blue-500/20 rounded-lg">
                <p class="font-semibold mb-2">Tips Posting:</p>
                <ul class="text-sm space-y-1">
                    <li><i class="fas fa-check-circle text-green-400 mr-2"></i>Gunakan emoji secukupnya</li>
                    <li><i class="fas fa-check-circle text-green-400 mr-2"></i>Balas dalam 1-2 tweet</li>
                    <li><i class="fas fa-check-circle text-green-400 mr-2"></i>Tambahkan pertanyaan untuk engagement</li>
                </ul>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
